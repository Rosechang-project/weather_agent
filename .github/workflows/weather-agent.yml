name: Weather Agent Scheduled Push

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"

jobs:
  run-weather-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install requests python-dotenv

      - name: Check Python syntax
        run: python -m py_compile main.py cwa_scraper.py moenv_scraper.py test_dify.py

      - name: Validate config JSON
        run: python -m json.tool config.json

      - name: Run Dify and LINE smoke test
        env:
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
          MOENV_API_KEY: ${{ secrets.MOENV_API_KEY }}
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python test_dify.py
