name: Weather Agent Scheduled Push

on:
  workflow_dispatch:
    inputs:
      report_mode:
        description: "Push mode"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evening
  schedule:
    # GitHub Actions cron uses UTC.
    # Taiwan time (Asia/Taipei, UTC+8):
    # - 23:13 UTC = 07:13 Taiwan time, morning push
    # - 13:17 UTC = 21:17 Taiwan time, evening push
    - cron: "13 23 * * *"
    - cron: "17 13 * * *"

jobs:
  run-weather-agent:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install requests python-dotenv

      - name: Check Python syntax
        run: python -m py_compile main.py cwa_scraper.py moenv_scraper.py test_dify.py

      - name: Validate config JSON
        run: python -m json.tool config.json

      - name: Run Dify and LINE smoke test
        env:
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
          MOENV_API_KEY: ${{ secrets.MOENV_API_KEY }}
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          WORKFLOW_REPORT_MODE: ${{ github.event.inputs.report_mode || 'auto' }}
          WORKFLOW_SCHEDULE: ${{ github.event.schedule || '' }}
        run: |
          MORNING_CRON="13 23 * * *"
          EVENING_CRON="17 13 * * *"

          echo "WORKFLOW_SCHEDULE=$WORKFLOW_SCHEDULE"
          echo "Runner time=$(date '+%Y-%m-%d %H:%M:%S %Z')"

          if [ "$WORKFLOW_REPORT_MODE" != "auto" ]; then
            export WEATHER_AGENT_MODE="$WORKFLOW_REPORT_MODE"
          elif [ "$WORKFLOW_SCHEDULE" = "$EVENING_CRON" ]; then
            export WEATHER_AGENT_MODE="evening"
          elif [ "$WORKFLOW_SCHEDULE" = "$MORNING_CRON" ]; then
            export WEATHER_AGENT_MODE="morning"
          else
            echo "Unknown schedule '$WORKFLOW_SCHEDULE'; defaulting to morning"
            export WEATHER_AGENT_MODE="morning"
          fi
          echo "WEATHER_AGENT_MODE=$WEATHER_AGENT_MODE"
          python test_dify.py
